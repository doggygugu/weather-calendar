name: Generate Weather Calendar

on:
  schedule:
    # Runs at 00:05 UTC daily (= 01:05 CET / 02:05 CEST)
    - cron: "5 0 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.12"

      - name: Generate ICS file
        run: python generate_weather_ics.py

      - name: Commit and push updated ICS
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: update weather calendar $(date -u +%Y-%m-%d)"
          git push
